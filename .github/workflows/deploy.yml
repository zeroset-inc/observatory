name: Deploy Observatory Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-observatory-worker
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install API dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Install UI dependencies
        working-directory: ui
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build UI assets
        run: bun run build

      - name: Resolve D1 database id and inject into wrangler.toml
        # The "observatory" D1 database is provisioned by Terraform in the nebula
        # monorepo (infra/cloudflare). Resolve its id by name at deploy time so the
        # two repos stay decoupled — no shared variable to keep in sync. Requires the
        # nebula Terraform to have been applied first (the lookup fails loudly if not).
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          id=$(bunx wrangler d1 list --json | jq -r '.[] | select(.name == "observatory") | (.uuid // .id)')
          if [ -z "$id" ] || [ "$id" = "null" ]; then
            echo "::error::D1 database 'observatory' not found in this Cloudflare account. Apply the nebula infra/cloudflare Terraform first." >&2
            exit 1
          fi
          sed -i "s|REPLACE_WITH_D1_DATABASE_ID|${id}|" wrangler.toml
          echo "Resolved D1 'observatory' id and injected into wrangler.toml."

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler d1 migrations apply observatory --remote

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy
