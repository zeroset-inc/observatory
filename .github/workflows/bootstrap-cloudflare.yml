name: Bootstrap Cloudflare Observatory

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Worker environment to bootstrap"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
      cutover_dns:
        description: "Remove conflicting DNS records before assigning the Worker custom domain"
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    concurrency:
      group: bootstrap-observatory-cloudflare-${{ inputs.environment }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install API dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Install UI dependencies
        working-directory: ui
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Build UI assets
        run: bun run build

      - name: Select bootstrap target
        id: target
        run: |
          set -euo pipefail
          target="${{ inputs.environment }}"
          if [ "$target" = "staging" ]; then
            {
              echo "wrangler_env=staging"
              echo "database_name=observatory-staging"
              echo "database_placeholder=REPLACE_WITH_OBSERVATORY_STAGING_D1_DATABASE_ID"
              echo "queue_name=observatory-runner-staging"
              echo "domain_name=observatory-staging.zeroset.com"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "wrangler_env="
              echo "database_name=observatory"
              echo "database_placeholder=REPLACE_WITH_OBSERVATORY_D1_DATABASE_ID"
              echo "queue_name=observatory-runner"
              echo "domain_name=observatory.zeroset.com"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve or create D1 database and inject into wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BOOTSTRAP_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_NAME: ${{ steps.target.outputs.database_name }}
          DATABASE_PLACEHOLDER: ${{ steps.target.outputs.database_placeholder }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID repository variable is required." >&2
            exit 1
          fi
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::CLOUDFLARE_BOOTSTRAP_API_TOKEN repository secret is required." >&2
            exit 1
          fi
          id=$(bunx wrangler d1 list --json | jq -r --arg name "$DATABASE_NAME" '.[] | select(.name == $name) | (.uuid // .id)')
          if [ -z "$id" ] || [ "$id" = "null" ]; then
            bunx wrangler d1 create "$DATABASE_NAME" --location enam
            id=$(bunx wrangler d1 list --json | jq -r --arg name "$DATABASE_NAME" '.[] | select(.name == $name) | (.uuid // .id)')
          fi
          if [ -z "$id" ] || [ "$id" = "null" ]; then
            echo "::error::D1 database '$DATABASE_NAME' could not be created or resolved." >&2
            exit 1
          fi
          sed -i "s|${DATABASE_PLACEHOLDER}|${id}|" wrangler.toml
          echo "Resolved D1 '$DATABASE_NAME' id and injected into wrangler.toml."

      - name: Ensure Queue exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BOOTSTRAP_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          QUEUE_NAME: ${{ steps.target.outputs.queue_name }}
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::CLOUDFLARE_BOOTSTRAP_API_TOKEN repository secret is required." >&2
            exit 1
          fi
          if ! bunx wrangler queues list | grep -E "(^|[[:space:]])${QUEUE_NAME}([[:space:]]|$)"; then
            bunx wrangler queues create "$QUEUE_NAME"
          fi

      - name: Apply D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BOOTSTRAP_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_NAME: ${{ steps.target.outputs.database_name }}
          WRANGLER_ENV: ${{ steps.target.outputs.wrangler_env }}
        run: |
          set -euo pipefail
          if [ -n "$WRANGLER_ENV" ]; then
            bunx wrangler d1 migrations apply "$DATABASE_NAME" --remote --env "$WRANGLER_ENV"
          else
            bunx wrangler d1 migrations apply "$DATABASE_NAME" --remote --env ""
          fi

      - name: Sync Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BOOTSTRAP_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          OBSERVATORY_SECRET: ${{ secrets.OBSERVATORY_SECRET }}
          WRANGLER_ENV: ${{ steps.target.outputs.wrangler_env }}
        run: |
          set -euo pipefail
          if [ -z "${OBSERVATORY_SECRET:-}" ]; then
            echo "::error::OBSERVATORY_SECRET repository secret is required." >&2
            exit 1
          fi
          if [ -n "$WRANGLER_ENV" ]; then
            printf "%s" "$OBSERVATORY_SECRET" | bunx wrangler secret put OBSERVATORY_SECRET --env "$WRANGLER_ENV"
          else
            printf "%s" "$OBSERVATORY_SECRET" | bunx wrangler secret put OBSERVATORY_SECRET
          fi

      - name: Remove conflicting DNS records for Worker custom domain
        if: ${{ inputs.cutover_dns }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BOOTSTRAP_API_TOKEN }}
          DOMAIN_NAME: ${{ steps.target.outputs.domain_name }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const token = process.env.CLOUDFLARE_API_TOKEN
          const domainName = process.env.DOMAIN_NAME
          const zoneName = "zeroset.com"

          if (!token) {
            throw new Error("CLOUDFLARE_BOOTSTRAP_API_TOKEN repository secret is required.")
          }

          async function cloudflare(path, init = {}) {
            const response = await fetch(`https://api.cloudflare.com/client/v4${path}`, {
              ...init,
              headers: {
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
                ...(init.headers ?? {}),
              },
            })
            const body = await response.json().catch(() => ({}))
            if (!response.ok || body.success === false) {
              const details = JSON.stringify(body.errors ?? body)
              throw new Error(`Cloudflare API ${init.method ?? "GET"} ${path} failed: ${details}`)
            }
            return body.result
          }

          const zones = await cloudflare(`/zones?name=${encodeURIComponent(zoneName)}`)
          const zone = zones?.[0]
          if (!zone?.id) {
            throw new Error(`Cloudflare zone '${zoneName}' was not found or token cannot read zones.`)
          }

          let records
          try {
            records = await cloudflare(
              `/zones/${zone.id}/dns_records?name=${encodeURIComponent(domainName)}`
            )
          } catch (error) {
            throw new Error(
              `${error.message}. The bootstrap token needs Zone DNS Read/Edit for ${zoneName} so the workflow can replace old ingress DNS with the Worker custom domain.`
            )
          }

          const conflicting = (records ?? []).filter((record) =>
            ["A", "AAAA", "CNAME"].includes(record.type)
          )
          for (const record of conflicting) {
            await cloudflare(`/zones/${zone.id}/dns_records/${record.id}`, { method: "DELETE" })
            console.log(`Deleted conflicting ${record.type} DNS record for ${record.name}.`)
          }
          if (conflicting.length === 0) {
            console.log(`No conflicting DNS records found for ${domainName}.`)
          }
          NODE

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_BOOTSTRAP_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_ENV: ${{ steps.target.outputs.wrangler_env }}
        run: |
          set -euo pipefail
          if [ -n "$WRANGLER_ENV" ]; then
            bunx wrangler deploy --env "$WRANGLER_ENV"
          else
            bunx wrangler deploy --env ""
          fi
